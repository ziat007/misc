    \ kWp\r\n    declination: 35      # Panel tilt from horizontal (degrees)\r\n \
    \   azimuth: 180         # 0=N, -90=E, 90=W, 180=S (Solcast convention)\r\n  \
    \  efficiency: 0.95     # Optional loss factor (default 1.0)\r\nopen_meteo_forecast_max_age:\
    \ 4.0  # Hours between cache refreshes (default 4)\r\n```\r\n\r\nMultiple arrays\
    \ with different orientations can be listed \u2014 their outputs are summed automatically.\r\
    \n\r\nPredbat fetches both a **P50 (central)** forecast and a **P10 (pessimistic)**\
    \ forecast from Open Meteo's ensemble API, applying a temperature-corrected PV\
    \ model for accuracy. Per-month `shading_factors` are also supported for site-specific\
    \ shading correction.\r\n\r\n* Per-Month Shading Factors ([#3798](https://github.com/springfall2008/batpred/pull/3798))\r\
    \n\r\nWhen using the Google Solar API (or manually), a 12-element list of per-month\
    \ shading factors can now be configured to improve solar yield accuracy throughout\
    \ the year, accounting for seasonal shading from trees, buildings, etc.\r\n\r\n\
    #### Marginal Cost Matrix Published to Predbat Gateway ([#3783](https://github.com/springfall2008/batpred/pull/3783))\r\
    \n\r\nThe marginal cost matrix is now published to the Predbat gateway, enabling\
    \ richer external integrations and dashboards.\r\n\r\n#### Compare Feature Improvements\
    \ ([#3799](https://github.com/springfall2008/batpred/pull/3799))\r\n\r\nThe tariff\
    \ comparison feature has been upgraded to support **larger battery sizes** and\
    \ now uses **rolling average data** for smoother, more reliable cost comparisons.\r\
    \n\r\nThe Compare feature lets you model what your energy costs would be on different\
    \ tariffs (or with different hardware) using your actual usage patterns. Predbat\
    \ runs a full optimisation for each tariff scenario once per day and publishes\
    \ the results as Home Assistant sensors.\r\n\r\nTo use it, add a `compare_list:`\
    \ to your `apps.yaml`:\r\n\r\n```yaml\r\ncompare_list:\r\n  - id: agile\r\n  \
    \  name: \"Octopus Agile\"\r\n    rates_import_octopus_url: \"https://api.octopus.energy/v1/products/AGILE-24-10-01/electricity-tariffs/E-1R-AGILE-24-10-01-{dno_region}/standard-unit-rates/\"\
    \r\n    rates_export_octopus_url: \"https://api.octopus.energy/v1/products/OUTGOING-FIX-12M-19-05-13/electricity-tariffs/E-1R-OUTGOING-FIX-12M-19-05-13-{dno_region}/standard-unit-rates/\"\
    \r\n  - id: flux\r\n    name: \"Octopus Flux\"\r\n    rates_import_octopus_url:\
    \ \"https://api.octopus.energy/v1/products/FLUX-IMPORT-23-02-14/electricity-tariffs/E-1R-FLUX-IMPORT-23-02-14-{dno_region}/standard-unit-rates/\"\
    \r\n    rates_export_octopus_url: \"https://api.octopus.energy/v1/products/FLUX-EXPORT-BB-23-02-14/electricity-tariffs/E-1R-FLUX-EXPORT-BB-23-02-14-{dno_region}/standard-unit-rates/\"\
    \r\n```\r\n\r\nYou can also override hardware specs per-scenario (e.g. `override_soc_max_kwh`,\
    \ `override_battery_rate_max_charge_kw`) to model what a larger battery or faster\
    \ charger would save you. Results are visible in the Predbat web UI under the\
    \ **Compare** view and as `predbat.compare_tariff_<id>` sensors. A manual run\
    \ can be triggered via **switch.predbat_compare_active**.\r\n\r\nSee the [Compare\
    \ documentation](https://springfall2008.github.io/batpred/compare/) for full configuration\
    \ options.\r\n\r\n### New Contributors\r\n\r\n- @amasolov \u2014 first contribution\
    \ (ML load inflation fix, [#3784](https://github.com/springfall2008/batpred/pull/3784))\r\
    \n\r\n---\r\n\r\n**Full Changelog**: https://github.com/springfall2008/batpred/compare/v8.36.3...v8.37.0\r\
    \n"
